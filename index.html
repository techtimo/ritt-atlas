<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VDD Rittatlas</title>
<link rel="icon" href="https://vdd-aktuell.de/favicon.ico">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/tabulator-tables@6.3.1/dist/css/tabulator_simple.min.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Open Sans', sans-serif; font-size: 13px; color: #333; background: #f3f3f3; }

/* ── top bar ── */
#header { background: #9D3230; color: #fff; padding: 10px 14px; flex-shrink: 0; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
#header h1, #scraped-at { flex-shrink: 0; }
#header h1 { font-size: 16px; font-weight: 600; white-space: nowrap; }
#scraped-at { font-size: 11px; opacity: .7; white-space: nowrap; }
#toggle-group { margin-left: auto; display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
#vorrat-toggle, #vergangene-toggle { font-size: 12px; display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; white-space: nowrap; }
#vorrat-toggle input, #vergangene-toggle input { cursor: pointer; width: 14px; height: 14px; accent-color: #ffcdd2; }

/* ── main split ── */
#app { display: flex; flex-direction: column; height: 100vh; }
#split { display: flex; flex: 1; overflow: hidden; }

/* left pane */
#left-pane { display: flex; flex-direction: column; width: 58%; border-right: 2px solid #ccc; overflow: hidden; min-height: 0; }

/* right pane: map */
#right-pane { flex: 1; position: relative; }
#map { position: absolute; inset: 0; }

@media (max-width: 860px) {
  #split { flex-direction: column; min-height: 0; }
  #left-pane { width: 100%; border-right: none; border-bottom: 2px solid #ccc; order: 2; flex: 1 1 65%; min-height: 0; overflow: hidden; }
  #right-pane { order: 1; width: 100%; flex: 0 0 40%; min-height: 120px; position: relative; }
  #map { position: absolute; inset: 0; }
  #controls { flex-wrap: wrap; }
  #search { flex: 1 1 40%; min-width: 35%; }
  #loc-controls { flex: 1; justify-content: flex-start; }

  /* fullscreen modal for mobile popups */
  .leaflet-popup { display: none; }
  .leaflet-popup.mobile-modal { display: flex; }
}

/* ── search bar ── */
#controls { display: flex; gap: 8px; align-items: center; padding: 7px 10px; background: #fff; border-bottom: 1px solid #ddd; flex-shrink: 0; }
#search { flex: 1; padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
#count  { font-size: 11px; color: #666; white-space: nowrap; }

/* ── grid ── */
#grid { flex: 1; min-height: 0; overflow: hidden; }

/* ── Tabulator overrides ── */
.tabulator { border: none !important; font-size: 12px; font-family: 'Open Sans', sans-serif; }
.tabulator .tabulator-header { background: #eaeaea; border-bottom: 2px solid #bbb !important; }
.tabulator .tabulator-header .tabulator-col { background: #eaeaea !important; border-right: 1px solid #d0d0d0 !important; }
.tabulator .tabulator-header .tabulator-col-title { font-size: 11px; font-weight: 600; }
.tabulator .tabulator-row { border-bottom: 1px solid #eee !important; cursor: pointer; }
.tabulator .tabulator-row .tabulator-cell { padding: 5px 7px !important; border-right: 1px solid #f0f0f0 !important; vertical-align: top; }
.tabulator .tabulator-row:hover .tabulator-cell { background: #fff8e1 !important; }
.tabulator .tabulator-row.no-coords { opacity: .6; }
.tabulator .tabulator-row.vorrat .tabulator-cell { background: #ffebee !important; }
.tabulator .tabulator-row.vorrat:hover .tabulator-cell { background: #ffcdd2 !important; }
.tabulator .tabulator-row.row-active .tabulator-cell { background: #ffe082 !important; }
.tabulator .tabulator-frozen { box-shadow: 2px 0 4px -2px rgba(0,0,0,.15) !important; }

.tbl-doc { display: inline-block; padding: 2px 6px; background: #2ea3f2; color: #fff; border-radius: 3px; font-size: 10px; text-decoration: none; white-space: nowrap; }
.tbl-doc:hover { background: #1a8fd1; }
.tbl-doc.updated::after { content: " *"; }

.status-fest  { color: #2e7d32; font-weight: 600; }
.status-vorl  { color: #e65100; }
.status-abges { color: #b71c1c; text-decoration: line-through; }

.no-map-badge { font-size: 10px; padding: 1px 4px; background: #eee; border-radius: 3px; color: #888; margin-left: 4px; }

/* ── popup ── */
.popup-name  { font-weight: 700; font-size: 14px; margin-bottom: 5px; }
.popup-row   { margin: 2px 0; font-size: 12px; }
.popup-label { color: #777; }
.popup-docs  { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 5px; }
.popup-doc   { display: inline-block; padding: 3px 8px; background: #2ea3f2; color: #fff !important; border-radius: 3px; font-size: 11px; text-decoration: none !important; font-weight: 600; }
.popup-doc:hover { background: #1a8fd1; color: #fff !important; }
.popup-doc.updated::after { content: " \2605"; opacity: .9; }
.popup-link  { display: inline-block; margin-top: 8px; font-size: 11px; color: #2ea3f2; }

/* ── filter bar ── */
#filter-bar { display: flex; gap: 10px; align-items: center; padding: 5px 10px; background: #f0f0f0; border-bottom: 1px solid #ddd; flex-shrink: 0; flex-wrap: wrap; }
.fbar-group { display: flex; align-items: center; gap: 5px; }
.fbar-label { font-size: 11px; color: #555; font-weight: 600; white-space: nowrap; }
#region-select { padding: 3px 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; max-width: 150px; }
.toggle-row { display: flex; gap: 3px; flex-wrap: wrap; }
.tog { padding: 2px 7px; border: 1px solid #ccc; border-radius: 3px; background: #fff; font-size: 11px; cursor: pointer; color: #555; }
.tog:hover { background: #e8f0fe; border-color: #aaa; }
.tog.active { background: #2ea3f2; color: #fff; border-color: #2ea3f2; }
#btn-clear-filters { padding: 2px 8px; border: 1px solid #ccc; border-radius: 4px; background: #fff; font-size: 11px; cursor: pointer; color: #666; margin-left: auto; display: none; }
#btn-clear-filters:hover { background: #fee; color: #c00; border-color: #fcc; }

/* ── location / radius ── */
#loc-controls { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
#btn-locate { padding: 4px 9px; border: 1px solid #bbb; border-radius: 4px; background: #fff; font-size: 12px; cursor: pointer; white-space: nowrap; line-height: 1.4; min-width: 96px; text-align: center; }
#btn-locate:hover { background: #e8f0fe; }
#btn-locate.active { background: #2ea3f2; color: #fff; border-color: #2ea3f2; }
#btn-locate.active:hover { background: #d32f2f; border-color: #d32f2f; }
#radius-slider { width: 100px; accent-color: #2ea3f2; cursor: pointer; }
#radius-label { font-size: 12px; color: #555; white-space: nowrap; min-width: 52px; }

/* ── mobile popup modal ── */
#popup-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 10000; align-items: center; justify-content: center; }
#popup-modal.show { display: flex; }
#popup-modal-content { background: #fff; border-radius: 8px; padding: 0; max-width: 90vw; max-height: 90vh; overflow: auto; box-shadow: 0 4px 20px rgba(0,0,0,.3); width: 100%; }
#popup-modal-header { background: #9D3230; color: #fff; padding: 12px 16px; border-radius: 8px 8px 0 0; font-weight: 600; font-size: 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
#popup-modal-title { flex: 1; }
#popup-modal-close { background: transparent; color: #fff; border: none; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; width: 32px; height: 32px; flex-shrink: 0; }
#popup-modal-close:hover { opacity: .7; }
#popup-modal-body { padding: 16px; }

@media (max-width: 860px) {
  #popup-modal-content { max-height: 80vh; }
}
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <h1>VDD Rittatlas 2026</h1>
    <span id="scraped-at"></span>
    <div id="toggle-group">
      <label id="vorrat-toggle"><input type="checkbox" id="show-vorrat"> Zeige Rittvorrat</label>
      <label id="vergangene-toggle"><input type="checkbox" id="show-vergangene" checked> Zeige Vergangene</label>
    </div>
  </div>

  <div id="split">
    <div id="left-pane">
      <div id="controls">
        <input id="search" type="search" placeholder="Suchen (Name, Region, Ort …)">
        <div id="loc-controls">
          <button id="btn-locate">&#x1F4CD; Standort</button>
          <input id="radius-slider" type="range" min="50" max="500" step="50" value="300">
          <span id="radius-label">300 km</span>
        </div>
        <span id="count"></span>
      </div>
      <div id="filter-bar">
        <div class="fbar-group">
          <span class="fbar-label">Region</span>
          <select id="region-select"><option value="">Alle</option></select>
        </div>
        <div class="fbar-group">
          <span class="fbar-label">Art</span>
          <div id="type-toggles" class="toggle-row"></div>
        </div>
        <div class="fbar-group">
          <span class="fbar-label">Distanz</span>
          <div class="toggle-row">
            <button class="tog" data-dist="efr">EFR</button>
            <button class="tog" data-dist="kdr">KDR</button>
            <button class="tog" data-dist="mdr">MDR</button>
            <button class="tog" data-dist="ldr">LDR</button>
            <button class="tog" data-dist="mtr">MTR</button>
            <button class="tog" data-dist="cei">CEI</button>
          </div>
        </div>
        <button id="btn-clear-filters">&#x2715; Filter</button>
      </div>
      <div id="grid"></div>
    </div>

    <div id="right-pane">
      <div id="map"></div>
    </div>
  </div>
</div>

<!-- mobile popup modal -->
<div id="popup-modal">
  <div id="popup-modal-content">
    <div id="popup-modal-header">
      <span id="popup-modal-title"></span>
      <button id="popup-modal-close">✕</button>
    </div>
    <div id="popup-modal-body"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>
<script src="data.js"></script>
<script>
let EVENTS = [];
const WIKI_FILE = "https://vdd-aktuell.de/mediawiki/index.php?title=Special:Redirect/file/";

let showVorrat = false;
let showVergangene = true;
const TODAY = new Date().toISOString().slice(0, 10);

// ── map ────────────────────────────────────────────────────────────────────
const map = L.map('map').setView([51.2, 10.4], 6);
L.Popup.mergeOptions({ autoPanPaddingTopLeft: L.point(0, 80) });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
  maxZoom: 18
}).addTo(map);

function markerColor(ev) {
  if (ev.rittvorrat) return '#c62828';
  const s = (ev.status || '').toLowerCase();
  if (s.includes('abgesagt')) return '#f9a825';
  if (s.includes('vorl'))    return '#e65100';
  return '#2e7d32';
}

function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: `<svg width="22" height="33" viewBox="0 0 24 36" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 0C5.37 0 0 5.37 0 12c0 9 12 24 12 24s12-15 12-24C24 5.37 18.63 0 12 0z"
            fill="${color}" stroke="#fff" stroke-width="1.5"/>
      <circle cx="12" cy="12" r="4.5" fill="#fff" opacity=".85"/>
    </svg>`,
    iconSize: [22, 33], iconAnchor: [11, 33], popupAnchor: [0, -33]
  });
}

const markers = {};

function fmtDateDe(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${d}.${m}.${y.slice(2)}`;
}

function dateRange(ev) {
  if (!ev.start_date) return '–';
  if (!ev.end_date || ev.start_date === ev.end_date) return fmtDateDe(ev.start_date);
  const [sy, sm, sd] = ev.start_date.split('-');
  const [ey, em, ed] = ev.end_date.split('-');
  if (sy === ey) return `${sd}.${sm} – ${ed}.${em}.${ey.slice(2)}`;
  return `${fmtDateDe(ev.start_date)} – ${fmtDateDe(ev.end_date)}`;
}

function pdfLink(filename, label, updated) {
  if (!filename) return '';
  const url = WIKI_FILE + encodeURIComponent(filename);
  return `<a class="popup-doc${updated ? ' updated' : ''}" href="${url}" target="_blank">${label}</a>`;
}

function popupHtml(ev) {
  const distParts = [
    ev.efr && `EFR ${ev.efr}`, ev.kdr && `KDR ${ev.kdr}`,
    ev.mdr && `MDR ${ev.mdr}`, ev.ldr && `LDR ${ev.ldr}`,
    ev.mtr && `MTR ${ev.mtr}`, ev.cei && `CEI ${ev.cei}`,
  ].filter(Boolean).join(' | ');

  let h = `<div class="popup-name">${ev.name || ev.wiki_title}`;
  if (ev.subtitle) h += ` <small style="font-weight:400">${ev.subtitle}</small>`;
  h += `</div>`;

  for (const [label, val] of [
    ['Datum', dateRange(ev)], ['Region', ev.region], ['Ort', ev.venue],
    ['Veranstalter', ev.organizer], ['Art', ev.event_types],
    ['Distanzen', distParts], ['Status', ev.status], ['Seit', ev.first_edition_year],
  ]) {
    if (val) h += `<div class="popup-row"><span class="popup-label">${label}: </span>${val}</div>`;
  }

  const docs = [
    pdfLink(ev.announcement_pdf, 'Ausschreibung', ev.announcement_updated),
    pdfLink(ev.results_pdf,      'Ergebnisliste', false),
    pdfLink(ev.registration_pdf, 'Nennformular',  false),
  ].filter(Boolean).join('');
  if (docs) h += `<div class="popup-docs">${docs}</div>`;

  if (ev.website) h += `<div class="popup-row" style="margin-top:4px"><a href="${ev.website}" target="_blank">Website</a></div>`;
  const link = ev.vdd_url || ev.wiki_url;
  if (link) h += `<a class="popup-link" href="${link}" target="_blank">VDD-Seite &rarr;</a>`;
  return h;
}

// ── filter logic ───────────────────────────────────────────────────────────
let filterText = '';
let userLat = null, userLon = null, radiusKm = 300;
let userMarker = null, radiusCircle = null;
let selectedRegion = '';
let selectedEventTypes = new Set();
let selectedDistances = new Set();

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371, rad = Math.PI / 180;
  const dLat = (lat2 - lat1) * rad, dLon = (lon2 - lon1) * rad;
  const a = Math.sin(dLat / 2) ** 2 +
            Math.cos(lat1 * rad) * Math.cos(lat2 * rad) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

function eventVisible(ev) {
  if (ev.rittvorrat && !showVorrat) return false;
  if (!showVergangene && (ev.end_date || ev.start_date) < TODAY) return false;
  if (selectedRegion && ev.region !== selectedRegion) return false;
  if (selectedEventTypes.size > 0) {
    if (!ev.event_types_arr.some(t => selectedEventTypes.has(t))) return false;
  }
  if (selectedDistances.size > 0) {
    let distMatch = false;
    for (const d of selectedDistances) { if (ev[d]) { distMatch = true; break; } }
    if (!distMatch) return false;
  }
  if (filterText) {
    const q = filterText.toLowerCase();
    return [ev.wiki_title, ev.name, ev.subtitle, ev.region, ev.venue,
            ev.event_types, ev.organizer, ev.status]
      .some(v => v && v.toLowerCase().includes(q));
  } else if (userLat !== null) {
    if (!ev.lat || !ev.lon) return false;
    return haversineKm(userLat, userLon, ev.lat, ev.lon) <= radiusKm;
  }
  return true;
}

function applyFilters() {
  tbl.setFilter(eventVisible);
}

function statusClass(s) {
  if (!s) return '';
  const l = s.toLowerCase();
  if (l.includes('abgesagt')) return 'status-abges';
  if (l.includes('vorl'))    return 'status-vorl';
  return 'status-fest';
}

// ── Tabulator column formatters ─────────────────────────────────────────────
function fmtName(cell) {
  const ev = cell.getRow().getData();
  const link = ev.vdd_url || ev.wiki_url;
  const name = ev.name || ev.wiki_title;
  let html = link
    ? `<a href="${link}" target="_blank" onclick="event.stopPropagation()">${name}</a>`
    : name;
  if (!ev.lat) html += '<span class="no-map-badge">kein GPS</span>';
  return html;
}

function fmtDate(cell) { return dateRange(cell.getRow().getData()); }

function fmtStatus(cell) {
  const s = cell.getValue() || '–';
  return `<span class="${statusClass(s)}">${s}</span>`;
}

function fmtPdf(pdfField, updatedField) {
  return function(cell) {
    const ev = cell.getRow().getData();
    const pdf = ev[pdfField];
    if (!pdf) return '';
    const updated = updatedField ? ev[updatedField] : false;
    return `<a class="tbl-doc${updated ? ' updated' : ''}" href="${WIKI_FILE}${encodeURIComponent(pdf)}" target="_blank" onclick="event.stopPropagation()">PDF</a>`;
  };
}

function fmtLink(cell) {
  const url = cell.getValue();
  return url ? `<a href="${url}" target="_blank" onclick="event.stopPropagation()">Link</a>` : '';
}

// ── Tabulator ──────────────────────────────────────────────────────────────
let tbl;
let activeId = null;

function initTable(data) {
  tbl = new Tabulator("#grid", {
    data,
    index: "id",
    height: "100%",
    layout: "fitData",
    initialSort: [{ column: "start_date", dir: "asc" }],
    columns: [
      { title: "Name",              field: "name",               formatter: fmtName,                                          frozen: true, width: window.innerWidth <= 768 ? 115 : 160 },
      { title: "Datum",             field: "start_date",         formatter: fmtDate },
      { title: "EFR",               field: "efr",                width: 45, headerSort: false },
      { title: "KDR",               field: "kdr",                width: 45, headerSort: false },
      { title: "MDR",               field: "mdr",                width: 45, headerSort: false },
      { title: "LDR",               field: "ldr",                width: 45, headerSort: false },
      { title: "MTR",               field: "mtr",                width: 55, headerSort: false },
      { title: "CEI",               field: "cei",                width: 55, headerSort: false },
      { title: "Ausschreibung",     field: "announcement_pdf",   formatter: fmtPdf("announcement_pdf", "announcement_updated"), sorter: false, width: window.innerWidth <= 768 ? 40 : 110 },
      { title: "Ergebnisliste",     field: "results_pdf",        formatter: fmtPdf("results_pdf", null),                      sorter: false, width: window.innerWidth <= 768 ? 40 : 100 },
      { title: "Nennformular",      field: "registration_pdf",   formatter: fmtPdf("registration_pdf", null),                 sorter: false, width: window.innerWidth <= 768 ? 40 : 100 },
      { title: "Seit",              field: "first_edition_year", sorter: "number" },
      { title: "Website",           field: "website",            formatter: fmtLink,                                          sorter: false, width: 70 },
      { title: "Art",               field: "event_types",        minWidth: 80 },
      { title: "Status",            field: "status",             formatter: fmtStatus,                                        width: 110 },
      { title: "Region",            field: "region",             width: 100 },
      { title: "Veranstaltungsort", field: "venue",              minWidth: 120 },
      { title: "Veranstalter",      field: "organizer",          minWidth: 120 },
    ],
    rowFormatter(row) {
      const d = row.getData();
      const el = row.getElement();
      el.classList.toggle('vorrat',    !!d.rittvorrat);
      el.classList.toggle('no-coords', !d.lat);
      el.classList.toggle('row-active', d.id === activeId);
    },
  });

  tbl.on("tableBuilt", () => {
    applyFilters();
    map.invalidateSize();
    fitVisibleMarkers();
  });

  tbl.on("rowClick", (_e, row) => focusEvent(row.getData()));

  tbl.on("dataFiltered", (_filters, rows) => {
    const visibleIds = new Set(rows.map(r => r.getData().id));
    EVENTS.forEach(ev => {
      if (!markers[ev.id]) return;
      visibleIds.has(ev.id) ? markers[ev.id].addTo(map) : markers[ev.id].remove();
    });
    document.getElementById('count').textContent = `${rows.length} / ${EVENTS.length}`;
  });
}

// ── interaction ────────────────────────────────────────────────────────────
function isMobileViewport() {
  return window.matchMedia('(max-width: 860px)').matches;
}

function showModalPopup(ev) {
  const modal = document.getElementById('popup-modal');
  const title = document.getElementById('popup-modal-title');
  const body = document.getElementById('popup-modal-body');
  
  const name = ev.name || ev.wiki_title;
  title.textContent = name;
  
  // Get full popup HTML and remove the duplicate name section
  let html = popupHtml(ev);
  html = html.replace(/<div class="popup-name">.*?<\/div>/s, '');
  body.innerHTML = html;
  
  modal.classList.add('show');
}

function hideModalPopup() {
  const modal = document.getElementById('popup-modal');
  modal.classList.remove('show');
}

// close button handler
document.getElementById('popup-modal-close').addEventListener('click', hideModalPopup);

// close modal when clicking outside
document.getElementById('popup-modal').addEventListener('click', e => {
  if (e.target.id === 'popup-modal') hideModalPopup();
});

function highlightRow(id) {
  const prevId = activeId;
  activeId = id;
  if (prevId) { const r = tbl.getRow(prevId); if (r) r.reformat(); }
  const row = tbl.getRow(id);
  if (row) { row.reformat(); tbl.scrollToRow(id, "nearest", false).catch(() => {}); }
}

function focusEvent(ev) {
  highlightRow(ev.id);
  if (markers[ev.id]) {
    if (isMobileViewport()) {
      showModalPopup(ev);
    } else {
      const marker = markers[ev.id];
      const popup = marker.getPopup();
      map.once('moveend', () => {
        popup.options.autoPan = false;
        marker.openPopup();
        popup.options.autoPan = true;
      });
      map.setView([ev.lat, ev.lon], Math.max(map.getZoom(), 10), { animate: true });
    }
  }
}

// ── filter bar ─────────────────────────────────────────────────────────────
function updateClearFiltersBtn() {
  const active = selectedRegion || selectedEventTypes.size || selectedDistances.size;
  document.getElementById('btn-clear-filters').style.display = active ? '' : 'none';
}

document.getElementById('region-select').addEventListener('change', e => {
  selectedRegion = e.target.value;
  updateClearFiltersBtn();
  applyFilters();
});

document.querySelectorAll('[data-dist]').forEach(btn => {
  btn.addEventListener('click', () => {
    const d = btn.dataset.dist;
    btn.classList.toggle('active');
    btn.classList.contains('active') ? selectedDistances.add(d) : selectedDistances.delete(d);
    updateClearFiltersBtn();
    applyFilters();
  });
});

document.getElementById('btn-clear-filters').addEventListener('click', () => {
  selectedRegion = ''; selectedEventTypes.clear(); selectedDistances.clear();
  document.getElementById('region-select').value = '';
  document.querySelectorAll('.tog.active').forEach(b => b.classList.remove('active'));
  updateClearFiltersBtn();
  applyFilters();
});

// ── controls ───────────────────────────────────────────────────────────────
document.getElementById('show-vorrat').addEventListener('change', e => {
  showVorrat = e.target.checked;
  applyFilters();
  if (showVorrat) {
    const modal = document.getElementById('popup-modal');
    document.getElementById('popup-modal-title').textContent = 'Hinweis: Rittvorrat';
    document.getElementById('popup-modal-body').innerHTML =
      '<p style="margin:0 0 10px;line-height:1.5">Der <strong>Rittvorrat</strong> enthält ältere Einträge, ' +
      'bei denen die aufgeführten Ritte teilweise seit <strong>Jahren nicht mehr stattgefunden</strong> haben. ' +
      'Diese Daten sind möglicherweise veraltet und spiegeln nicht den aktuellen Stand wieder.</p>' +
      '<p style="margin:0;line-height:1.5">Vermisst du einen dieser Ritte? ' +
      'Vielleicht kannst du dabei helfen, einen der Ritte wieder aufleben zu lassen. ' +
      'Möglicherweise kannst du dich mit dem Veranstalter in Verbindung setzen.</p>';
    modal.classList.add('show');
  }
});

document.getElementById('show-vergangene').addEventListener('change', e => {
  showVergangene = e.target.checked;
  applyFilters();
});

document.getElementById('search').addEventListener('input', e => {
  filterText = e.target.value;
  if (filterText) clearRadius();
  applyFilters();
});

const GERMANY_BOUNDS = [[47.2, 5.8], [55.1, 15.1]];

function fitVisibleMarkers() {
  map.fitBounds(GERMANY_BOUNDS);
}

function clearRadius() {
  userLat = null; userLon = null;
  if (userMarker)   { userMarker.remove();   userMarker = null; }
  if (radiusCircle) { radiusCircle.remove(); radiusCircle = null; }
  const btn = document.getElementById('btn-locate');
  btn.classList.remove('active');
  btn.textContent = '📍 Standort';
  fitVisibleMarkers();
}

document.getElementById('btn-locate').addEventListener('click', () => {
  if (userLat !== null) { clearRadius(); applyFilters(); return; }
  if (!navigator.geolocation) { alert('Geolocation nicht verfügbar'); return; }
  const btn = document.getElementById('btn-locate');
  btn.textContent = '⏳ …';
  btn.disabled = true;
  console.log('[Standort] Standortabfrage gestartet (enableHighAccuracy=true, timeout=15s)');
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude, longitude, accuracy, altitude, altitudeAccuracy, heading, speed } = pos.coords;
    console.log('[Standort] Position erhalten:', {
      lat: latitude, lon: longitude,
      accuracy_m: accuracy,
      altitude, altitudeAccuracy, heading, speed,
      timestamp: new Date(pos.timestamp).toISOString()
    });
    userLat = latitude;
    userLon = longitude;
    filterText = '';
    document.getElementById('search').value = '';
    if (userMarker)   { userMarker.remove();   userMarker = null; }
    if (radiusCircle) { radiusCircle.remove(); radiusCircle = null; }

    userMarker = L.marker([userLat, userLon], {
      icon: L.divIcon({
        className: '',
        html: '<div style="width:14px;height:14px;border-radius:50%;background:#2ea3f2;border:3px solid #fff;box-shadow:0 0 6px rgba(0,0,0,.5)"></div>',
        iconSize: [14, 14], iconAnchor: [7, 7]
      }),
      zIndexOffset: 1000
    }).addTo(map).bindPopup(`Mein Standort<br><small>Genauigkeit: ±${Math.round(accuracy)} m</small>`);

    radiusKm = +document.getElementById('radius-slider').value || 300;
    radiusCircle = L.circle([userLat, userLon], {
      radius: radiusKm * 1000, color: '#2ea3f2', weight: 2,
      fillColor: '#2ea3f2', fillOpacity: 0.07
    }).addTo(map);

    map.invalidateSize();
    map.fitBounds(radiusCircle.getBounds());
    btn.textContent = '✕ Löschen';
    btn.disabled = false;
    btn.classList.add('active');
    applyFilters();
  }, err => {
    console.error('[Standort] Fehler:', err.code, err.message);
    btn.textContent = '📍 Standort';
    btn.disabled = false;
    alert('Standort konnte nicht ermittelt werden: ' + err.message);
  }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
});

document.getElementById('radius-slider').addEventListener('input', e => {
  radiusKm = +e.target.value;
  document.getElementById('radius-label').textContent = radiusKm + ' km';
  if (radiusCircle) {
    radiusCircle.setRadius(radiusKm * 1000);
    map.fitBounds(radiusCircle.getBounds());
    applyFilters();
  }
});

// ── load data ──────────────────────────────────────────────────────────────
(function () {
  const { events, scraped_at } = VDD_DATA;
  EVENTS = events.map((ev, i) => {
    const strip = f => ev[f] ? String(ev[f]).replace(/\s+/g, '') : ev[f];
    return { ...ev, id: ev.id ?? ev.wiki_title ?? String(i), event_types_arr: (ev.event_types || '').split(',').map(s => s.trim()).filter(Boolean), efr: strip('efr'), kdr: strip('kdr'), mdr: strip('mdr'), ldr: strip('ldr'), mtr: strip('mtr'), cei: strip('cei') };
  });
  document.getElementById('scraped-at').textContent = 'Stand: ' + fmtDateDe(scraped_at.slice(0, 10));

  // populate region dropdown
  const regionSel = document.getElementById('region-select');
  [...new Set(EVENTS.map(e => e.region).filter(Boolean))].sort().forEach(r => {
    const o = document.createElement('option'); o.value = r; o.textContent = r;
    regionSel.appendChild(o);
  });

  // populate event-type toggles
  const allTypes = new Set();
  EVENTS.forEach(e => e.event_types_arr.forEach(t => allTypes.add(t)));
  const typeRow = document.getElementById('type-toggles');
  [...allTypes].sort().forEach(type => {
    const btn = document.createElement('button');
    btn.className = 'tog'; btn.textContent = type; btn.dataset.type = type;
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
      btn.classList.contains('active') ? selectedEventTypes.add(type) : selectedEventTypes.delete(type);
      updateClearFiltersBtn();
      applyFilters();
    });
    typeRow.appendChild(btn);
  });

  EVENTS.forEach(ev => {
    if (ev.lat && ev.lon) {
      const m = L.marker([ev.lat, ev.lon], { icon: makeIcon(markerColor(ev)) })
        .bindPopup(popupHtml(ev), { maxWidth: 340 });
      m.on('click', () => {
        highlightRow(ev.id);
        if (isMobileViewport()) {
          showModalPopup(ev);
        } else {
          markers[ev.id].openPopup();
        }
      });
      markers[ev.id] = m;
    }
  });

  initTable(EVENTS);
})();
</script>
