app = "vdd-rittatlas-push"
primary_region = "fra"

[build]

[env]
  DB_PATH = "/data/push.db"
  ALLOWED_ORIGIN = "https://techtimo.github.io"
  PUSH_TTL = "86400"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "push_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
