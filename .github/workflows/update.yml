name: Update map

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-slim
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install --quiet --no-cache-dir -r scraper/requirements.txt

      - name: Check for wiki changes
        id: check
        run: |
          result=$(python scraper/vdd_scrape.py --check-only)
          echo "changed=$result" >> "$GITHUB_OUTPUT"

      - name: Snapshot old data
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          if git show HEAD:data.min.json > old.min.json 2>/dev/null; then
            echo "old data saved"
          else
            echo "[]" > old.min.json
          fi

      - name: Run scraper
        if: steps.check.outputs.changed == 'true'
        run: python scraper/vdd_scrape.py

      - name: Commit & push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data.min.json
          git diff --cached --quiet || (git commit -m "chore: auto-update data $(date -u +%Y-%m-%d)" && git pull --rebase && git push)

      - name: Wake up push server
        if: steps.check.outputs.changed == 'true'
        env:
          PUSH_SERVER_URL: ${{ secrets.PUSH_SERVER_URL }}
        run: |
          python - <<'EOF'
          import os, requests, time, sys
          url = os.environ["PUSH_SERVER_URL"].rstrip("/") + "/health"
          for attempt in range(6):
              try:
                  resp = requests.get(url, timeout=15)
                  if resp.status_code < 500:
                      print(f"Server ready after {attempt+1} attempt(s)")
                      sys.exit(0)
              except Exception as e:
                  print(f"Attempt {attempt+1}/6: {e}")
              time.sleep(5)
          print("WARNING: server did not respond; proceeding anyway", file=sys.stderr)
          EOF

      - name: Send push notifications
        if: steps.check.outputs.changed == 'true'
        env:
          NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN }}
          PUSH_SERVER_URL: ${{ secrets.PUSH_SERVER_URL }}
        run: |
          python scraper/notify_diff.py --old old.min.json --new data.min.json --server "$PUSH_SERVER_URL"
